<!doctype html><html lang="ms"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,maximum-scale=1"><meta name="theme-color" content="#07111f"><meta name="description" content="AZ EduSmart — pembelajaran interaktif untuk remaja Tingkatan 1 dan 2."><title>AZ EduSmart v8.0</title><link rel="stylesheet" href="css/app.css"><meta name="theme-color" content="#7c5cff"><meta name="apple-mobile-web-app-capable" content="yes"><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"><meta name="apple-mobile-web-app-title" content="AZ EduSmart"><link rel="manifest" href="manifest.webmanifest"></head><body>
<div class="splash-screen" id="splashScreen">
  <div>
    <div class="splash-logo">AZ</div>
    <h1>AZ EduSmart</h1>
    <p>Learn • Challenge • Grow</p><div class="splash-version">VERSION 8.0</div>
    <div class="loader"><i></i></div>
  </div>
</div>
<div class="onboarding" id="onboarding">
  <div class="onboard-card">
    <h2>Selamat datang! 👋</h2>
    <p>Sediakan profil pelajar sekali sahaja sebelum memulakan pembelajaran.</p>
    <div class="formrow"><label>Nama pelajar</label><input id="onboardName" placeholder="Contoh: Ahmad Danish"></div>
    <div class="formrow"><label>Nama sekolah</label><input id="onboardSchool" placeholder="Contoh: SMK Raja Permaisuri Bainun"><div class="form-help">Maklumat ini hanya disimpan pada peranti ini.</div></div>
    <div class="formrow"><label>Tingkatan</label><select id="onboardLevel"><option value="1">Tingkatan 1</option><option value="2">Tingkatan 2</option></select></div>
    <label>Pilih avatar</label>
    <div class="avatar-grid" id="avatarGrid">
      <button class="avatar-choice active" data-avatar="🧑‍🎓">🧑‍🎓</button>
      <button class="avatar-choice" data-avatar="👦">👦</button>
      <button class="avatar-choice" data-avatar="👧">👧</button>
      <button class="avatar-choice" data-avatar="🧕">🧕</button>
      <button class="avatar-choice" data-avatar="🧑‍🚀">🧑‍🚀</button>
      <button class="avatar-choice" data-avatar="🦸">🦸</button>
      <button class="avatar-choice" data-avatar="🥷">🥷</button>
      <button class="avatar-choice" data-avatar="🤓">🤓</button>
    </div>
    <button class="primary" onclick="completeOnboarding()">Mula Perjalanan Saya 🚀</button>
  </div>
</div>
<div id="toast"></div><header><button class="brand" id="brand"><span class="brandmark">AZ</span><span><b>EduSmart <span class="version-chip">v8.0</span></b><small>Learn • Challenge • Level Up</small></span></button><div class="header-actions audio-panel"><button class="iconbtn" id="installAppBtn" onclick="installAZApp()" style="display:none" aria-label="Pasang aplikasi">⬇️</button>
<button class="audio-toggle" id="audioBtn" aria-label="Hidupkan atau matikan audio">🔊</button>
<button class="iconbtn" id="theme" aria-label="Tukar tema">◐</button>
<div class="volume-wrap" id="volumeWrap"><span class="audio-label">Kelantangan</span><input id="volumeSlider" type="range" min="0" max="100" value="35"></div>
</div></header><main id="app"></main><nav class="bottomnav"><button data-v="home">🏠<span>Utama</span></button><button data-v="progress">📊<span>Prestasi</span></button><button data-v="settings">⚙️<span>Tetapan</span></button></nav><script src="js/app.js" defer></script><script>if("serviceWorker" in navigator){window.addEventListener("load",()=>navigator.serviceWorker.register("sw.js"));}</script></body></html>
